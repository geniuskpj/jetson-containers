name: onnxruntime (dev)

on:
  # pull_request:
  #   types: [ready_for_review, synchronize, reopened]
  #   branches: [ dev ]
  workflow_dispatch:
    # inputs:
    #   fork_repo:
    #     description: 'Fork repository (e.g., tokk-nv/jetson-containers)'
    #     required: false
    #     type: string
    #   fork_branch:
    #     description: 'Branch from fork to test (e.g., dev)'
    #     required: false
    #     type: string
    #     default: 'dev'

jobs:
  test-package-orin:
    runs-on: [ubuntu-22.04-arm]
    name: "Package Build Test (orin)"
    # if: github.event.pull_request.draft == false

    steps:
      - name: Pre-checkout cleanup
        run: |
          echo "=== Pre-checkout Cleanup ==="
          echo "Cleaning up permission-restricted files before checkout..."
          sudo rm -rf /home/jetson/actions-runner/_work/jetson-containers/jetson-containers/data || echo "Data cleanup completed"
          sudo rm -rf /home/jetson/actions-runner/_work/jetson-containers/jetson-containers/logs || echo "Logs cleanup completed"
          echo "Pre-checkout cleanup completed"

      - name: Checkout PR or Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event_name == 'workflow_dispatch' && inputs.fork_repo != '' && inputs.fork_repo || github.repository }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.fork_branch != '' && inputs.fork_branch || github.ref }}

      - name: Display system info
        run: bash .github/workflows/scripts/step-system-info.sh

      - name: Record environment variables
        run: bash .github/workflows/scripts/step-env-info.sh

      - name: Clean environment for fresh build
        run: bash .github/workflows/scripts/step-clean-environment.sh

      - name: Show git repository state
        run: bash .github/workflows/scripts/step-git-status.sh

        # --- NEW STEP: Install Python Dependencies ---
      - name: Install Python Dependencies
        run: |
          echo "=== Installing Python Dependencies ==="
          # Ensure pip is installed and up to date for the system python
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip
          
          # Upgrade pip
          sudo python3 -m pip install --upgrade pip
          
          # Install project requirements globally to ensure they are available to the build script
          # --break-system-packages is used for newer Ubuntu/Debian versions where pip restricts system installs
          if [ -f "requirements.txt" ]; then
            sudo python3 -m pip install -r requirements.txt --break-system-packages
            echo "✅ Requirements installed successfully"
          else
            echo "⚠️ requirements.txt not found, skipping dependency installation"
          fi
        shell: bash
        
      - name: Test build onnxruntime package on orin
        id: package-test
        run: bash .github/workflows/scripts/step-build-package.sh onnxruntime

      - name: Analyze build results
        if: always()
        run: bash .github/workflows/scripts/step-analyze-results.sh onnxruntime ${{ steps.package-test.outputs.stage1 }} ${{ steps.package-test.outputs.stage2 }} ${{ steps.package-test.outputs.build_status }}

      - name: Test build results
        run: bash .github/workflows/scripts/step-test-results-summary.sh onnxruntime ${{ steps.package-test.outputs.stage1 }} ${{ steps.package-test.outputs.stage2 }} ${{ steps.package-test.outputs.build_status }} ${{ steps.package-test.outputs.failure_phase }} ${{ steps.package-test.outputs.failure_stage }} ${{ steps.package-test.outputs.failure_component }}
